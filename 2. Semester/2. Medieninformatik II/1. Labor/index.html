<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name = "viewport" content="width = device-width, intial-scale = 1.0">

        <title>Lotto-Generator</title>

        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>

    <body>
        <div class="text" id="ueberschrift"><h1>Der Lotto-Generator</h1></div>
        <div class="text" id="regeln"><p>Beim Lotto 6 aus 49 tippen Sie auf sechs Zahlen aus dem Zahlenblock von 1 bis 49.</p></div>

        <div id="lotto-container" class="grid-container"></div>

        <div class="controls">
            <button id="play-btn" disabled>Spielen</button>
            <button id="reset-btn" style="display: none;">Neues Spiel</button>
        </div>
        <div id="result-message"></div>
    </body>

</html>
